model:
  version: v2
  vocab_size: 256
  enc_dim: 320
  dec_dim: 320
  enc_num_layers: 6
  dec_num_layers: 6
  enc_num_heads: 8
  dec_num_heads: 8
  enc_ffn_dim: 1280
  dec_ffn_dim: 1280
  max_position_embeddings: 2048
  rope_theta: 10000.0
  partial_rotary_factor: 0.9
  attention_dropout: 0.0
  ffn_dropout: 0.0
  window_left: 16
  window_right_first_last: 4
  window_right_middle: 0
  ctc_weight: 0.3
  label_smoothing: 0.0
  blank_token_id: 3
  sos_eos_token_id: 4
  pad_token_id: 5
  qk_norm: false
  min_audio_samples: 400

training:
  batch_size: 32
  precision: fp16

logging:
  backend: tensorboard
  project: ru-moonshine
  name: overfit-v2-tiny-100

data:
  train_manifest: data/manifests/overfit_100.jsonl
  val_manifest: data/manifests/overfit_100.jsonl
  tokenizer_model: data/tokenizer_256.model
